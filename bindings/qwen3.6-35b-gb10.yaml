## The run command (verbatim, reproducible)

```bash
docker run --rm -it \
  --gpus all --ipc=host --network host \
  -v ~/.cache/huggingface:/root/.cache/huggingface \
  -v ~/models:/models \
  -e VLLM_USE_DEEP_GEMM=0 \
  -e VLLM_SKIP_DEEP_GEMM_WARMUP=1 \
  ghcr.io/timothystewart6/vllm-gb10:v0.20.1-gb10.0 \
  vllm serve /models/Qwen3.6-35B-A3B-FP8 \
  --served-model-name qwen3.6-35b \
  --host 0.0.0.0 --port 8000 \
  --max-model-len 65536 --max-num-seqs 4 \
  --gpu-memory-utilization 0.8 \
  --enable-prefix-caching --language-model-only \
  --reasoning-parser qwen3 \
  --enable-auto-tool-choice --tool-call-parser qwen3_coder
```

