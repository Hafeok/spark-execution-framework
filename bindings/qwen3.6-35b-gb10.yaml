## Validation record (2026-07-02)

Serves cleanly and answers correctly. Endpoint reachable from a client over the direct-Ethernet link at `http://<spark-ip>:8000/v1`.

**Batching — the QUEUE-mode thesis, measured.** 12 concurrent requests (200-token generations, thinking off):

| metric | value |
| --- | --- |
| wall-clock, 12 concurrent | 18.9 s |
| implied serial (12 × first-request 4.8 s) | ~57 s |
| **effective throughput multiple** | **~3×** |
| completion pattern | clustered in ~3 waves (matches `max_num_seqs: 4` → 12÷4 = 3 batches) |

The tight within-cluster timing (e.g. three requests at 7.677 / 7.679 / 7.680 s) is the batch boundary made visible — those sequences were decoded together. This is the substrate's central claim confirmed on real hardware: **batching the frontier against one resident model beats serial execution**, here by ~3× at a deliberately conservative batch width.

Caveats on the number: short generations mean prefill+scheduling overhead is a large fraction; longer, thinking-on coding cells should show a *higher* ratio (more decode to overlap). Treat 3× as a floor for this binding, not a ceiling.

---

## The tuning knob: `max_num_seqs` is QUEUE-mode batch width

The 3× (not 12×) result is governed by `max_num_seqs: 4` — vLLM batches at most 4 sequences, so 12 requests ran as 3 waves. This is precisely the **batch-admission** parameter from the substrate design: how many work-units the executor admits concurrently against the resident binding.

- **Raise it** (8, 16, …) → wider batches, higher aggregate throughput, more KV-cache memory consumed. Community runs of this exact model/box reach ~92–118 tok/s aggregate at higher concurrency.
- **Lower it** → narrower batches, more KV headroom per request, lower throughput.

It is part of the binding because it changes the throughput/memory operating point. A day-tier coding binding may want it higher; a long-context binding lower. **Open validation task:** sweep `max_num_seqs` ∈ {4, 8, 16} on this box, record the wall-time and KV-memory curve, and set the QUEUE-mode default from measured data rather than the conservative bring-up value.

