## Provenance notes (why the bring-up was hard, so it isn't repeated)

- The upstream `vllm/vllm-openai:latest` is amd64 — fails instantly on this aarch64 box.
- The CUDA-13 nightly loads the model but crashes in DeepGEMM at weight-prep *and* warmup on sm_121 ("Unknown SF transformation" / "Unknown recipe").
- Explicit `--moe-backend` values all fail on FP8 here (`flashinfer_b12x` unimplemented, `cutlass` disabled-for-config); **defaults + `VLLM_USE_DEEP_GEMM=0`** is the working combination.
- The native-compiled community image (`timothystewart6/vllm-gb10`, pinned) plus that env var is what serves. It runs on the 580.x driver via CUDA compatibility; a driver bump to ≥595 would widen image options but is not required for this binding.

