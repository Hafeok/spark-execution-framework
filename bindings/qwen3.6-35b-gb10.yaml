# Model Binding: qwen3.6-35b-gb10

> The first **validated** SPMC Model binding for this framework. A concrete instance of the Model axis the Specification Framework defines abstractly: not a model *name*, but a fully-pinned tuple that determines output — image, driver, quantization, kernel-routing env, serving flags, and sampling defaults — plus the measured behaviour that makes it a real binding rather than an aspiration.
>
> **Status: validated on hardware, 2026-07-02.** Serves, answers correctly, batches as the substrate predicts. This is the anchor the QUEUE-mode day tier references.

---

## Why this file exists

The Specification Framework's Model axis is explicit that a name is not a binding: "if two things can carry this same label and produce different output, the label is not yet a binding." Everything below is what had to be pinned before `qwen3.6-35b` meant one determinate behaviour on this box. Most of it was discovered the hard way during bring-up — the kernel-routing env var in particular is not optional and not rediscoverable under pressure, which is exactly why a binding is a committed artifact and not a memory.

This binding fills the `model-binding` field of a WorkUnit (see `interface/work-unit-interface.md`) for QUEUE-mode day work.

---

## The binding

```yaml
binding_id: qwen3.6-35b-gb10
validated: 2026-07-02
tier: day            # QUEUE-mode, batched, interactive-to-best-effort
substrate: dgx-spark-gb10

# --- hardware / platform (part of the binding: quantization fit + kernel arch depend on it) ---
platform:
  chip: GB10 (Grace-Blackwell, sm_121)
  unified_memory_gb: 128
  driver: 580.159.03          # NOTE: below the >=595 some newer images want; this binding is built for 580.x
  cuda: "13.0"

# --- serving image (pinned, immutable, native-compiled for sm_121) ---
image: ghcr.io/timothystewart6/vllm-gb10:v0.20.1-gb10.0
#   native -gencode=arch=compute_121,code=sm_121 build, NOT forward-compat from sm_120.
#   Reproducible: same versions.env -> same image. Do NOT use :latest (mutable).
vllm_version: 0.20.1

# --- model + quantization (the Model-axis core) ---
model:
  repo: Qwen/Qwen3.6-35B-A3B-FP8
  local_path: /models/Qwen3.6-35B-A3B-FP8
  served_name: qwen3.6-35b
  architecture: MoE, 35B total / ~3B active per token, 256 experts
  quantization: FP8 (fine-grained, block size 128)   # ~37.5 GB on disk
#   FP8 is load-bearing: it fits 128 GB with KV headroom AND sidesteps the FP4/NVFP4
#   sm_121 kernel gap. A different quant is a DIFFERENT binding.

# --- kernel routing (discovered during bring-up; NOT optional) ---
env:
  VLLM_USE_DEEP_GEMM: "0"          # THE fix. DeepGEMM has no working sm_121 recipe for this
                                   #   model's block-FP8 scales; it asserts "Unknown recipe" /
                                   #   "Unknown SF transformation" at weight-prep AND warmup.
                                   #   =0 routes FP8 to CUTLASS/Triton, which has sm_121 support.
  VLLM_SKIP_DEEP_GEMM_WARMUP: "1"  # belt-and-suspenders: skip the warmup pass that crashed.
#   Do NOT pass --moe-backend explicitly: flashinfer_b12x is unimplemented for FP8 MoE here,
#   cutlass is "disabled for this configuration", and the auto-tuned DEFAULT is what works.

# --- serving flags ---
flags:
  host: 0.0.0.0
  port: 8000
  max_model_len: 65536             # NOT 262144 — that over-reserves KV cache on 128 GB
  max_num_seqs: 4                  # QUEUE-mode batch width — see "the tuning knob" below
  gpu_memory_utilization: 0.8      # 0.8 is the stable long-running GB10 value (0.9 unstable)
  enable_prefix_caching: true      # repeated system prompts not re-prefilled (prefill is the weak spot)
  language_model_only: true        # skip the vision encoder — frees memory for KV cache
  reasoning_parser: qwen3          # splits <think> into a separate `reasoning` response field
  enable_auto_tool_choice: true
  tool_call_parser: qwen3_coder

# --- sampling defaults (Prompt/Context-axis; from the model card, for coding) ---
sampling:
  temperature: 0.6
  top_p: 0.95
  top_k: 20
  presence_penalty: 0.0

# --- thinking behaviour (part of the binding, not an afterthought) ---
thinking:
  default: on                      # model reasons in <think> before answering
  budget_note: >
    With thinking ON, a coding cell needs a generous max_tokens (1500-2000+): 300 tokens
    is exhausted by reasoning alone and never reaches the answer (observed: finish_reason
    "length" mid-think, content null, answer under `reasoning`).
  disable_for_quick: '{"chat_template_kwargs": {"enable_thinking": false}}'
  framework_note: >
    The reasoning/content split the qwen3 parser produces aligns with the Execution
    Contract boundary: `reasoning` is the session-scoped reasoning-trace artifact,
    `content` (or tool_calls) is the output artifact. The binding hands them over
    already separated.
```

